services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=30GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - vergeos-exporter
    networks:
      - monitoring

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/vergeos-dashboard-pinuid.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  vergeos-exporter:
    image: ghcr.io/verge-io/vergeos-exporter:${EXPORTER_VERSION:-latest}
    container_name: vergeos-exporter
    restart: unless-stopped
    command:
      - "-verge.url=${VERGE_URL}"
      - "-verge.username=${VERGE_USERNAME}"
      - "-verge.password=${VERGE_PASSWORD}"
      - "-web.listen-address=:9888"
      - "-insecure=${INSECURE:-false}"
    ports:
      - "9888:9888"
    networks:
      - monitoring

networks:
  monitoring: {}

volumes:
  prometheus_data: {}
  grafana_data: {}
